services:
  - type: web
    name: quant-ratings
    runtime: python
    buildCommand: bash build.sh
    startCommand: python main.py --interval 3600
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
